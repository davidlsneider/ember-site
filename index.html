<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ember — Coming soon</title>
<meta name="description" content="Ember Sovereignty Systems. Coming soon.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0A0E14">
<meta name="color-scheme" content="dark">
<link rel="canonical" href="https://embersovereignty.com/">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0E14'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%234D9FFF'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@500;600&display=swap" rel="stylesheet">
<script src="/hero.js" defer></script>
<style>
  :root{--bg:#0A0E14;--surface:#101722;--line:#24344D;--white:#F2F7FF;--muted:#8CA0B8;--ember:#4D9FFF;--glow:#9FCBFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100svh;background:var(--bg);color:var(--muted);font:400 17px/1.6 "IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--ember);color:var(--bg)}
  #ember-field{position:fixed;inset:0;width:100vw;height:100svh;z-index:0;opacity:0;transition:opacity 1.6s ease}
  #ember-field.on{opacity:1}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,rgba(10,14,20,.88),rgba(10,14,20,.47) 44%,rgba(10,14,20,.03) 70%)}
  main{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;width:min(1200px,100%);margin:0 auto;padding:30px 40px 64px}
  .brand{font:500 11px/1.4 "IBM Plex Mono",monospace;letter-spacing:.22em;color:var(--muted)}
  .brand i{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ember);margin-right:10px;box-shadow:0 0 10px rgba(77,159,255,.55);animation:smolder 4.4s ease-in-out infinite}
  .center{width:min(540px,100%);margin:auto 0;padding:64px 0}
  h1{color:var(--white);font-size:clamp(42px,6vw,68px);font-weight:600;line-height:1.05;letter-spacing:-.025em;text-wrap:balance}
  form{display:flex;width:min(470px,100%);margin-top:36px}
  label{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  input[type="email"]{min-width:0;flex:1;background:rgba(10,14,20,.78);border:1px solid var(--line);border-right:0;border-radius:5px 0 0 5px;padding:13px 14px;color:var(--white);font:400 16px/1.4 "IBM Plex Sans",system-ui,sans-serif;backdrop-filter:blur(8px)}
  input[type="email"]::placeholder{color:#71809A}
  input[type="email"]:focus{position:relative;z-index:1;outline:2px solid var(--ember);outline-offset:-1px;border-color:var(--ember)}
  button{flex:0 0 auto;border:0;border-radius:0 5px 5px 0;background:var(--ember);color:var(--bg);padding:0 20px;cursor:pointer;font:500 12px/1 "IBM Plex Mono",monospace;letter-spacing:.06em}
  button:hover{background:var(--glow)}
  button:focus-visible{outline:2px solid var(--glow);outline-offset:3px}
  .hp{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden}
  footer{font:400 10.5px/1.4 "IBM Plex Mono",monospace;letter-spacing:.14em;color:#71809A}
  @keyframes rise{to{opacity:1;transform:none}}
  .center>*{opacity:0;transform:translateY(10px);animation:rise .8s cubic-bezier(.2,.6,.2,1) forwards}
  .center form{animation-delay:.18s}
  @keyframes smolder{0%,100%{box-shadow:0 0 5px rgba(77,159,255,.3);opacity:.75}50%{box-shadow:0 0 14px rgba(77,159,255,.9);opacity:1}}
  @media(prefers-reduced-motion:reduce){.brand i{animation:none}.center>*{animation:none;opacity:1;transform:none}}
  @media(max-width:720px){
    .veil{background:linear-gradient(180deg,rgba(10,14,20,.65),rgba(10,14,20,.35) 42%,rgba(10,14,20,.2) 68%,rgba(10,14,20,.5))}
    main{padding:22px 24px 38px}
    .center{padding-bottom:150px}
    h1{font-size:clamp(40px,13vw,58px)}
    form{margin-top:30px}
    button{padding:0 15px}
  }
</style>
</head>
<body>
<canvas id="ember-field" aria-hidden="true"></canvas>
<div class="veil" aria-hidden="true"></div>
<main>
  <p class="brand"><i aria-hidden="true"></i>EMBER SOVEREIGNTY SYSTEMS</p>
  <div class="center">
    <h1>Coming soon.</h1>
    <form method="POST" action="/api/briefing">
      <input type="hidden" name="source" value="coming-soon">
      <label for="email">Work email</label>
      <input id="email" type="email" name="email" required maxlength="254" autocomplete="email" inputmode="email" placeholder="Work email">
      <div class="hp" aria-hidden="true">
        <label for="website">Website</label>
        <input id="website" type="text" name="website" tabindex="-1" autocomplete="off">
      </div>
      <button type="submit">NOTIFY ME</button>
    </form>
  </div>
  <footer>© 2026</footer>
</main>
</body>
</html>
