<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ember Sovereignty Systems</title>
<meta name="description" content="Sovereign mode for AI products.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0E14'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%234D9FFF'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0E14;--line:#1E2936;--white:#F2F7FF;--muted:#8CA0B8;--ember:#4D9FFF;--glow:#9FCBFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--muted);font:400 17px/1.7 "IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  ::selection{background:var(--ember);color:var(--bg)}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:560px}
  .brand{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.22em;color:var(--muted);margin-bottom:36px}
  .brand i{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ember);margin-right:10px}
  h1{color:var(--white);font-size:clamp(28px,5vw,40px);font-weight:600;line-height:1.15;letter-spacing:-.015em;margin-bottom:20px}
  p{margin-bottom:28px}
  .btn{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.06em;text-decoration:none;padding:12px 22px;border-radius:4px;background:var(--ember);color:var(--bg);font-weight:500}
  .btn:hover{background:var(--glow)}
  .btn:focus-visible{outline:2px solid var(--glow);outline-offset:3px}
  footer{text-align:center;padding:22px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.14em;color:#4A5567}
</style>
</head>
<body>
<main>
  <div class="card">
    <p class="brand"><i></i>EMBER SOVEREIGNTY SYSTEMS</p>
    <h1>Sovereign mode<br>for AI products.</h1>
    <p>A clean room where a vendor's intelligence meets a user's data under the user's key — and nobody keeps the data. Even the vendor can't see it. And that's verifiable.</p>
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSe-hn-DRgtQaQdSClrjDeVCLhMQKo0MSc7xJsMOIAlV6-RovA/viewform" target="_blank" rel="noopener">Request a briefing</a>
  </div>
</main>
<footer>EMBER SOVEREIGNTY SYSTEMS · © 2026</footer>
</body>
</html>
