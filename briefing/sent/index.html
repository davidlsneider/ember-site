<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ember — You’re on the list</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0A0E14">
<meta name="color-scheme" content="dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0E14'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%234D9FFF'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;family=IBM+Plex+Sans:wght@500;600&amp;display=swap" rel="stylesheet">
<script src="/hero.js" defer></script>
<style>
  :root{--bg:#0A0E14;--white:#F2F7FF;--muted:#8CA0B8;--ember:#4D9FFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100svh;background:var(--bg);color:var(--muted);font:400 17px/1.6 "IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  #ember-field{position:fixed;inset:0;width:100vw;height:100svh;z-index:0;opacity:0;transition:opacity 1.6s ease}
  #ember-field.on{opacity:1}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,rgba(10,14,20,.88),rgba(10,14,20,.47) 44%,rgba(10,14,20,.03) 70%)}
  main{position:relative;z-index:2;min-height:100svh;display:flex;flex-direction:column;width:min(1200px,100%);margin:0 auto;padding:30px 40px 64px}
  .brand{font:500 11px/1.4 "IBM Plex Mono",monospace;letter-spacing:.22em}
  .brand a{color:var(--muted);text-decoration:none}
  .brand i{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ember);margin-right:10px;box-shadow:0 0 10px rgba(77,159,255,.55)}
  .center{width:min(540px,100%);margin:auto 0;padding:64px 0 150px}
  h1{color:var(--white);font-size:clamp(40px,6vw,64px);font-weight:600;line-height:1.08;letter-spacing:-.025em}
  p{margin-top:14px}
  footer{font:400 10.5px/1.4 "IBM Plex Mono",monospace;letter-spacing:.14em;color:#71809A}
  @media(max-width:720px){.veil{background:linear-gradient(180deg,rgba(10,14,20,.65),rgba(10,14,20,.35) 42%,rgba(10,14,20,.2) 68%,rgba(10,14,20,.5))}main{padding:22px 24px 38px}}
</style>
</head>
<body>
<canvas id="ember-field" aria-hidden="true"></canvas>
<div class="veil" aria-hidden="true"></div>
<main>
  <p class="brand"><a href="/"><i aria-hidden="true"></i>EMBER</a></p>
  <div class="center">
    <h1>You’re on the list.</h1>
    <p>We’ll be in touch.</p>
  </div>
  <footer>EMBER · © 2026</footer>
</main>
</body>
</html>
